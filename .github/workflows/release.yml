name: Release

on:
  release:
    types:
      - published

defaults:
  run:
    shell: bash

jobs:
  linux-x64:
    name: Linux (x64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev zlib1g-dev
          cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DFALLOUT_VENDORED=OFF
          cmake --build build -j$(nproc)
      - name: Pack + Upload
        run: |
          mkdir -p package
          cp build/fallout2-ce package/
          cp fallout2-ce/ddraw.ini package/
          cp fallout2-ce/f2_res.ini package/
          cp fallout2-ce/fallout2.cfg package/
          cp tools/setup-game-data.sh package/
          cd package
          tar -czvf ../fallout2-ce-linux-x64.tar.gz .
          cd ..
          gh release upload ${{ github.event.release.tag_name }} fallout2-ce-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    name: macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cmake -B build -G Xcode -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY=''
          cmake --build build --config RelWithDebInfo -j$(sysctl -n hw.logicalcpu)
      - name: Pack + Upload
        run: |
          mkdir -p package
          cp -R "build/RelWithDebInfo/Fallout II Community Edition.app" package/
          cp fallout2-ce/ddraw.ini package/
          cp fallout2-ce/f2_res.ini package/
          cp fallout2-ce/fallout2.cfg package/
          cp tools/setup-game-data.sh package/
          cd package
          zip -r ../fallout2-ce-macos.zip .
          cd ..
          gh release upload ${{ github.event.release.tag_name }} fallout2-ce-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    name: Windows
    runs-on: windows-2019
    steps:
      - uses: actions/checkout@v4
      - name: Cache cmake build
        uses: actions/cache@v4
        with:
          path: build
          key: windows-x64-cmake-v1
      - name: Configure
        run: cmake -B build -G "Visual Studio 16 2019" -A x64
      - name: Build
        run: cmake --build build --config RelWithDebInfo
      - name: Pack + Upload
        run: |
          mkdir -p package
          cp build/RelWithDebInfo/fallout2-ce.exe package/
          cp fallout2-ce/ddraw.ini package/
          cp fallout2-ce/f2_res.ini package/
          cp fallout2-ce/fallout2.cfg package/
          cp tools/setup-game-data.bat package/
          cd package
          7z a ../fallout2-ce-windows.zip *
          cd ..
          gh release upload ${{ github.event.release.tag_name }} fallout2-ce-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  xbox:
    name: Xbox
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup NXDK
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake flex bison clang lld llvm
          git clone --recursive https://github.com/XboxDev/nxdk.git ${{ github.workspace }}/nxdk
          export NXDK_DIR=${{ github.workspace }}/nxdk
          export PATH=$NXDK_DIR/bin:$PATH
          make -C $NXDK_DIR NXDK_ONLY=y -j$(nproc)
          make -C $NXDK_DIR/tools/cxbe
          mkdir -p $NXDK_DIR/tools/extract-xiso/build
          cd $NXDK_DIR/tools/extract-xiso/build
          cmake .. && make -j$(nproc)
      - name: Build Xbox ISO
        run: |
          export NXDK_DIR=${{ github.workspace }}/nxdk
          export PATH=$NXDK_DIR/bin:$PATH
          cp fallout2-ce/fallout2-xbox.cfg fallout2-ce/fallout2.cfg
          nxdk-cmake -B build-nxdk -S . -DNXDK_DIR=$NXDK_DIR
          cmake --build build-nxdk -j$(nproc)
      - name: Upload
        run: |
          zip -j fallout2-ce-xbox.zip \
            fallout2-ce.iso \
            fallout2-ce/default.xbe \
            fallout2-ce/ddraw.ini \
            fallout2-ce/f2_res.ini \
            fallout2-ce/fallout2.cfg \
            fallout2-ce/TitleImage.xbx
          gh release upload "${{ github.event.release.tag_name }}" fallout2-ce-xbox.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  steam-deck:
    name: Steam Deck
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build + Package
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev zlib1g-dev cmake libfuse2
          cmake -B build-deck -DCMAKE_BUILD_TYPE=Release -DFALLOUT_VENDORED=OFF
          cmake --build build-deck -j$(nproc)
          wget -q -O linuxdeploy.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy.AppImage
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp build-deck/fallout2-ce          AppDir/usr/bin/fallout2-ce
          cp tools/steamdeck/fallout2-ce.desktop AppDir/usr/share/applications/
          cp tools/steamdeck/icon.png        AppDir/usr/share/icons/hicolor/256x256/apps/fallout2-ce.png
          APPIMAGE_EXTRACT_AND_RUN=1 OUTPUT=Fallout2-CE-SteamDeck-x86_64.AppImage \
            ./linuxdeploy.AppImage --appdir AppDir --output appimage
          mkdir -p package
          mv Fallout2-CE-SteamDeck-x86_64.AppImage package/
          cp tools/steamdeck/f2_res.ini package/
          cp fallout2-ce/ddraw.ini package/
          cp fallout2-ce/fallout2.cfg package/
          cp tools/setup-game-data.sh package/
          cd package
          zip ../fallout2-ce-steam-deck.zip *
      - name: Upload
        run: gh release upload "${{ github.event.release.tag_name }}" fallout2-ce-steam-deck.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
